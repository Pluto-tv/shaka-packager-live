# Release workflow for dynamic-packager (shared library) builds.
# Manually triggered with a tag input. Builds all platforms,
# creates a GitHub release, and attaches shared library artifacts
# plus the C header file.
# This is a minimum placeholder to make workflow appear inside an Actions tab.
# full definition is available in the dynamic-packager branch

name: Release Dynamic Packager

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v3.7.0-dynamic.1)'
        required: true
        type: string

jobs:
  settings:
    name: Settings
    uses: ./.github/workflows/settings.yaml

  build:
    name: Build
    needs: settings
    uses: ./.github/workflows/build.yaml
    with:
      ref: ${{ github.sha }}
      self_hosted: ${{ needs.settings.outputs.self_hosted != '' }}
      debug: ${{ needs.settings.outputs.debug != '' }}
      extra_cmake_args: '-DUSE_WORKAROUND_FOR_TRUN_VERSION_0=1'
      build_types: '["Release"]'
      lib_types: '["shared"]'
      os_filter: '["linux-x64", "osx-x64", "osx-arm64"]'

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    concurrency:
      group: release-dynamic-packager
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*-shared
          path: artifacts
          merge-multiple: true

      - name: Debug
        run: find artifacts -ls || true

      - name: Create release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          gh -R "${{ github.repository }}" release create \
              "$TAG" \
              --target ${{ github.sha }} \
              --title "$TAG" \
              --generate-notes \
              -- artifacts/*
